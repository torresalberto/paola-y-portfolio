name: Deploy 3 Websites via FTP

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        website:
          - name: website-authority
            url-path: authority
          - name: website-innovator
            url-path: innovator
          - name: website-executive
            url-path: executive
      fail-fast: false

    name: Deploy ${{ matrix.website.name }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy ${{ matrix.website.name }} to FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./${{ matrix.website.name }}/
          server-dir: /${{ matrix.website.url-path }}/
          dangerous-clean-slate: false
